<section class="login-page" id="loginPage">
  <div class="login-card">
    <img
      id="loginLogo"
      class="login-logo"
      src="assets/logo-tpk.webp"
      alt="Logo TPK Kabupaten Buleleng"
      loading="eager"
      decoding="async"
    >

    <h1 class="login-title">Masuk Aplikasi</h1>
    <p class="login-subtitle">Silakan login menggunakan ID Kader dan password Anda</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="loginIdUser">ID Kader</label>
        <input
          type="text"
          id="loginIdUser"
          name="id_user"
          autocomplete="username"
          placeholder="Contoh: TPK1731"
          required
        >
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <div class="password-input-wrap">
          <input
            type="password"
            id="loginPassword"
            name="password"
            autocomplete="current-password"
            placeholder="Masukkan password"
            required
          >
          <button type="button" id="togglePasswordBtn" class="toggle-password-btn" aria-label="Lihat password">
            👁
          </button>
        </div>
        <small class="field-hint">Masukkan password sesuai akun yang terdaftar.</small>
      </div>

      <div id="backendConfigSection" class="backend-config-section hidden">
        <div class="form-group">
          <label for="backendUrlInput">URL Backend</label>
          <input
            type="url"
            id="backendUrlInput"
            name="backend_url"
            placeholder="https://script.google.com/..."
          >
        </div>

        <button type="button" id="saveBackendBtn" class="btn btn-secondary">
          Simpan Backend
        </button>
      </div>

      <button type="submit" id="loginSubmitBtn" class="btn btn-primary btn-block">
        Masuk
      </button>

      <button
        type="button"
        id="openBackendConfigBtn"
        class="btn btn-secondary btn-block hidden"
      >
        Pengaturan Backend
      </button>

      <div id="loginMessage" class="login-message hidden"></div>
    </form>
  </div>
</section>
