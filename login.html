<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - TPK Kabupaten Buleleng</title>

  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <img
        id="loginLogo"
        class="login-logo"
        src="assets/img/logo-tpk.svg"
        alt="Logo TPK Kabupaten Buleleng"
        decoding="async"
      >

      <h1 class="login-title">Masuk Aplikasi</h1>
      <p class="login-subtitle">
        Silakan login menggunakan ID Kader dan password Anda
      </p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginIdUser">ID Kader</label>
          <input
            type="text"
            id="loginIdUser"
            name="id_user"
            placeholder="Contoh: TPK1731"
            autocomplete="username"
            required
          >
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="loginPassword"
              name="password"
              placeholder="Masukkan password"
              autocomplete="current-password"
              required
            >
            <button
              type="button"
              id="togglePasswordBtn"
              class="password-toggle-btn"
              aria-label="Lihat password"
              title="Lihat password"
            >👁</button>
          </div>
          <small class="input-hint">
            Masukkan password sesuai akun yang terdaftar.
          </small>
        </div>

        <div id="backendConfigSection" class="backend-config hidden">
          <div class="form-group">
            <label for="backendUrlInput">URL Backend</label>
            <input
              type="url"
              id="backendUrlInput"
              name="backend_url"
              placeholder="https://script.google.com/macros/s/.../exec"
            >
          </div>

          <button type="button" id="saveBackendBtn" class="btn btn-secondary">
            Simpan Backend
          </button>
        </div>

        <button type="submit" id="loginSubmitBtn" class="btn btn-primary">
          Masuk
        </button>

        <button
          type="button"
          id="openBackendConfigBtn"
          class="btn btn-secondary hidden"
        >
          Pengaturan Backend
        </button>

        <div id="loginMessage" class="login-message hidden"></div>
      </form>
    </section>
  </main>

  <script src="js/app-config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
