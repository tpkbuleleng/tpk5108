<!DOCTYPE html>
    <section id="dashboard-screen" class="screen hidden">
      <header class="topbar">
        <div>
          <h2 class="topbar-title">TPK Kabupaten Buleleng</h2>
          <p id="topbar-subtitle" class="topbar-subtitle">Dashboard</p>
        </div>
        <div class="topbar-actions">
          <span id="network-badge" class="badge badge-warning">Offline</span>
          <button id="btn-logout" class="btn btn-danger btn-sm">Keluar</button>
        </div>
      </header>

      <main class="page-content">
        <section class="card profile-card">
          <h3>Profil Pengguna</h3>
          <div class="profile-grid">
            <div><span class="label">Nama</span><strong id="profile-nama">-</strong></div>
            <div><span class="label">Role</span><strong id="profile-role">-</strong></div>
            <div><span class="label">ID Kader</span><strong id="profile-id">-</strong></div>
            <div><span class="label">Tim</span><strong id="profile-tim">-</strong></div>
            <div><span class="label">Wilayah</span><strong id="profile-wilayah">-</strong></div>
          </div>
        </section>

        <section class="stats-grid">
          <article class="card stat-card">
            <span class="label">Jumlah Sasaran</span>
            <strong id="stat-sasaran">0</strong>
          </article>
          <article class="card stat-card">
            <span class="label">Pendampingan Bulan Ini</span>
            <strong id="stat-pendampingan">0</strong>
          </article>
          <article class="card stat-card">
            <span class="label">Draft Pending</span>
            <strong id="stat-draft">0</strong>
          </article>
        </section>

        <section class="card">
          <div class="section-header">
            <h3>Menu Utama</h3>
            <p class="muted-text">Menu akan menyesuaikan hak akses pengguna</p>
          </div>
          <div id="menu-grid" class="menu-grid"></div>
        </section>

        <section class="card">
          <div class="section-header">
            <h3>Status Sinkronisasi</h3>
          </div>
          <div id="sync-summary" class="sync-summary">
            <p class="muted-text">Belum ada data sinkronisasi.</p>
          </div>
          <div class="section-actions">
            <button id="btn-sync-now" class="btn btn-primary">Sinkronkan Sekarang</button>
          </div>
        </section>
      </main>
    </section>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="./js/app-config.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/session.js"></script>
  <script src="./js/notifier.js"></script>
  <script src="./js/validators.js"></script>
  <script src="./js/ui-helpers.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/bootstrap.js"></script>
  <script src="./js/router.js"></script>
  <script src="./js/offline-sync.js"></script>
  <script src="./js/menu.js"></script>
  <script src="./js/dynamic-form.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
