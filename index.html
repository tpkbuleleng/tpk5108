<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPK KABUPATEN BULELENG</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <link rel="icon" href="assets/img/logo.png">
</head>
<body>

    <main id="view-splash" class="view-section splash-container active">
        <img src="assets/img/logo.png" alt="Logo TPK" class="splash-logo">
        <h2 class="splash-title">TPK KABUPATEN BULELENG</h2>
        <div class="loader"></div>
    </main>

    <main id="view-login" class="view-section hidden">
        <div class="login-card">
            <img src="assets/img/logo.png" alt="Logo" class="login-logo">
            <p class="app-subtitle">Aplikasi Pencatatan dan Pelaporan</p>
            <h2 class="app-title">TPK KABUPATEN BULELENG</h2>
            
            <form id="form-login" class="modern-form">
                <div class="form-group">
                    <label>ID Pengguna</label>
                    <input type="text" id="kader-id" class="form-control" placeholder="Masukkan ID" required>
                </div>
                <div class="form-group">
                    <label>PIN / Password</label>
                    <div class="password-field">
                        <input type="password" id="kader-pin" class="form-control" placeholder="••••••" required>
                        <span class="toggle-eye" onclick="togglePasswordVisibility()">👁️</span>
                    </div>
                </div>
                <button type="submit" id="btn-login-submit" class="btn-primary">Masuk</button>
            </form>
        </div>
    </main>

    <main id="view-app" class="view-section hidden">
        <header class="app-header">
            <div class="header-left">
                <button id="btn-menu" class="btn-burger">☰</button>
                <div class="header-info">
                    <h1 id="user-greeting">Dashboard</h1>
                    <span id="network-status" class="status-badge offline">Offline</span>
                </div>
            </div>
            <button class="btn-logout-icon" onclick="logout()">🚪</button>
        </header>

        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-user-box">
                <img src="assets/img/logo.png" alt="Logo" class="sidebar-avatar">
                <div class="sidebar-user-text">
                    <h3 id="sidebar-nama">Nama User</h3>
                    <p id="sidebar-role">Role Akses</p>
                </div>
            </div>
            <nav id="dynamic-menu-container" class="sidebar-nav">
                </nav>
        </aside>

        <section id="content-area" class="content-body">
            </section>
    </main>

    <template id="template-registrasi">
        <div class="content-card animate-fade">
            <div class="card-header">
                <h3>📝 Registrasi Sasaran Baru</h3>
                <p>Lengkapi data sesuai wilayah tugas Anda.</p>
            </div>
            <form id="form-registrasi" class="modern-form">
                <div class="form-group">
                    <label>Desa / Kelurahan</label>
                    <select id="reg-desa" class="form-control" required>
                        <option value="">-- Pilih Desa --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Dusun / Banjar / RW</label>
                    <select id="reg-dusun" class="form-control" required>
                        <option value="">-- Pilih Dusun --</option>
                    </select>
                </div>
                <hr class="divider">
                <div id="pertanyaan-dinamis">
                    </div>
                <button type="submit" class="btn-primary">💾 Simpan Laporan</button>
            </form>
        </div>
    </template>

    <script src="assets/js/app.js" type="module"></script>
    <script>
        function togglePasswordVisibility() {
            const pin = document.getElementById('kader-pin');
            pin.type = pin.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
