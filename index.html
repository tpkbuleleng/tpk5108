<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPK KABUPATEN BULELENG</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <link rel="icon" href="assets/img/logo.png">
</head>
<body>

    <main id="view-splash" class="view-section splash-container active">
        <img src="assets/img/logo.png" alt="Logo TPK" class="splash-logo">
        <h2 class="splash-title">TPK KABUPATEN BULELENG</h2>
        <div class="loader"></div>
    </main>

    <main id="view-login" class="view-section hidden">
        <div class="login-card">
            <img src="assets/img/logo.png" alt="Logo" class="login-logo">
            <p class="app-subtitle">Aplikasi Pencatatan dan Pelaporan</p>
            <h2 class="app-title">TPK KABUPATEN BULELENG</h2>
            <form id="form-login" class="modern-form">
                <div class="form-group"><label>ID Pengguna</label><input type="text" id="kader-id" class="form-control" placeholder="Masukkan ID" required></div>
                <div class="form-group">
                    <label>PIN / Password</label>
                    <div class="password-field">
                        <input type="password" id="kader-pin" class="form-control" placeholder="••••••" required>
                        <span class="toggle-eye" onclick="const p=document.getElementById('kader-pin');p.type=p.type==='password'?'text':'password';">👁️</span>
                    </div>
                </div>
                <button type="submit" id="btn-login-submit" class="btn-primary">Masuk</button>
            </form>
        </div>
    </main>

    <main id="view-app" class="view-section hidden">
        <header class="app-header">
            <div class="header-left">
                <button id="btn-menu" class="btn-burger">☰</button>
                <div class="header-info">
                    <h1 id="user-greeting">DASHBOARD</h1>
                    <span id="network-status" class="status-badge offline">Offline</span>
                </div>
            </div>
            <button class="btn-logout-icon" onclick="window.logout()">🚪</button>
        </header>

        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-user-box">
                <img src="assets/img/logo.png" alt="Logo" class="sidebar-avatar">
                <div class="sidebar-user-text">
                    <h3 id="sidebar-nama">Nama User</h3>
                    <p id="sidebar-role">Role Akses</p>
                </div>
            </div>
            <nav id="dynamic-menu-container" class="sidebar-nav"></nav>
        </aside>

        <section id="content-area" class="content-body"></section>
    </main>

    <template id="template-registrasi">
        <div class="card animate-fade">
            <h3 style="margin-bottom: 15px; color: var(--primary);">📝 Registrasi Sasaran Baru</h3>
            <form id="form-registrasi" class="modern-form">
                
                <div class="form-group"><label>Nama Sasaran</label><input type="text" name="nama_sasaran" class="form-control" placeholder="Sesuai KTP" required></div>
                <div class="form-group"><label>Nama Kepala Keluarga</label><input type="text" name="nama_kk" class="form-control" placeholder="Sesuai KK" required></div>

                <div class="form-group" id="box-ibu-kandung" style="display: none; background: #f8f9fa; padding: 10px; border-left: 3px solid #198754;">
                    <label style="color: #198754; font-weight: bold; font-size: 0.9rem;">Nama Ibu Kandung (Khusus BADUTA)</label>
                    <input type="text" id="input-ibu-kandung" name="nama_ibu_kandung" class="form-control" placeholder="Isi nama ibu kandung">
                </div>

                <div class="form-group">
                    <label>Jenis Sasaran</label>
                    <select id="reg-jenis" name="jenis_sasaran" class="form-control" required>
                        <option value="">-- Pilih Jenis --</option>
                        <option value="CATIN">CATIN (Calon Pengantin)</option>
                        <option value="BUMIL">BUMIL (Ibu Hamil)</option>
                        <option value="BUFAS">BUFAS (Ibu Pasca Persalinan)</option>
                        <option value="BADUTA">BADUTA (Anak 0-23 Bulan)</option>
                    </select>
                </div>

                <div class="form-group"><label>NIK (16 Digit Angka)</label><input type="text" name="nik" class="form-control" maxlength="16" minlength="16" pattern="[0-9]{16}" oninput="this.value=this.value.replace(/[^0-9]/g,'');" placeholder="Contoh: 5108xxxxxxxxxxxx" required></div>
                <div class="form-group"><label>No KK</label><input type="text" name="no_kk" class="form-control" maxlength="16" minlength="16" pattern="[0-9]{16}" oninput="this.value=this.value.replace(/[^0-9]/g,'');" placeholder="Masukkan 16 digit No KK"></div>
                <div class="form-group"><label>Tanggal Lahir</label><input type="date" name="tanggal_lahir" class="form-control" required></div>

                <div class="form-group">
                    <label>Jenis Kelamin</label>
                    <select name="jenis_kelamin" class="form-control" required>
                        <option value="Perempuan">Perempuan</option>
                        <option value="Laki-laki">Laki-laki</option>
                    </select>
                </div>

                <div class="form-group" id="box-tgl-nikah" style="display: none; background: #e8f4fd; padding: 15px; border-radius: 8px; border-left: 4px solid #0d6efd;">
                    <label style="color: #0d6efd; font-weight: bold; margin-bottom:5px; display:block;">📅 Tanggal Pernikahan (Khusus CATIN)</label>
                    <input type="date" id="input-tgl-nikah" name="tanggal_pernikahan" class="form-control">
                </div>

                <div id="wilayah-catin" style="display: none; background: #fff3cd; padding: 15px; border-radius: 8px; margin-top: 15px; margin-bottom: 15px; border-left: 4px solid #ffc107;">
                    <label style="color: #856404; font-weight: bold; margin-bottom: 10px; display: block;">📍 Alamat Asal (Khusus CATIN)</label>
                    <div class="form-group"><label>Provinsi</label><input type="text" name="prov_asal" class="form-control" value="BALI" readonly></div>
                    <div class="form-group"><label>Kabupaten/Kota</label><select id="catin-kab" name="kab_asal" class="form-control"></select></div>
                    <div class="form-group"><label>Kecamatan</label><select id="catin-kec" name="kec_asal" class="form-control"></select></div>
                    <div class="form-group"><label>Desa / Kelurahan</label><select id="catin-desa" name="desa_asal" class="form-control"></select></div>
                    <div class="form-group"><label>Dusun / Banjar / RW</label><input type="text" name="dusun_asal" class="form-control" placeholder="Ketik Dusun/Banjar Asal"></div>
                </div>

                <div id="wilayah-domisili">
                    <hr style="margin: 20px 0; border: 0; border-top: 2px dashed #eee;">
                    <h4 style="margin-bottom: 15px; color: var(--primary);">Alamat Domisili</h4>
                    <div class="form-group"><label>Desa/Kelurahan Domisili</label><select id="reg-desa" name="desa" class="form-control" required></select></div>
                    <div class="form-group"><label>Dusun/RW Domisili</label><select id="reg-dusun" name="dusun" class="form-control" required></select></div>
                    <div class="form-group"><label>Alamat Lengkap</label><textarea id="reg-alamat" name="alamat" class="form-control" rows="2" placeholder="Nama Jalan / Banjar" required></textarea></div>
                </div>

                <div id="pertanyaan-dinamis" style="margin-top: 20px;"></div>
                <button type="submit" class="btn-primary" style="margin-top: 20px; width: 100%;">💾 Simpan Registrasi</button>
            </form>
        </div>
    </template>

    <template id="template-daftar-sasaran">
        <div class="card animate-fade">
            <h3 style="margin-bottom: 15px; color: var(--primary);">📋 Daftar Sasaran</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <select id="filter-jenis" class="form-control" style="flex: 1; padding: 8px; font-weight: bold;">
                    <option value="ALL">Semua Jenis</option>
                    <option value="CATIN">CATIN</option>
                    <option value="BUMIL">BUMIL</option>
                    <option value="BUFAS">BUFAS</option>
                    <option value="BADUTA">BADUTA</option>
                </select>
                <select id="filter-status" class="form-control" style="flex: 1; padding: 8px; font-weight: bold;">
                    <option value="ALL">Semua Status</option>
                    <option value="AKTIF">Aktif</option>
                    <option value="SELESAI">Selesai</option>
                </select>
            </div>
            <div id="list-sasaran" style="display: flex; flex-direction: column; gap: 10px;"></div>
        </div>

        <div id="modal-detail" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; padding: 20px; box-sizing: border-box; overflow-y: auto;">
            <div class="card animate-fade" style="margin-top: 20px; position: relative; max-width: 500px; margin-left: auto; margin-right: auto;">
                <button id="btn-tutup-modal" style="position: absolute; right: 15px; top: 15px; background: #dc3545; color: white; border: none; border-radius: 5px; padding: 6px 12px; font-weight: bold; cursor: pointer;">Tutup</button>
                <h3 style="color: var(--primary); margin-bottom: 15px; padding-right: 60px;">🔍 Detail Sasaran</h3>
                <div id="konten-detail"></div>
            </div>
        </div>
    </template>

    <template id="template-pendampingan">
        <div class="card animate-fade">
            <h3 style="margin-bottom: 15px; color: var(--primary);">🤝 Laporan Pendampingan</h3>
            <form id="form-pendampingan" class="modern-form">
                
                <div class="form-group">
                    <label>Jenis Sasaran</label>
                    <select id="pend-jenis" class="form-control" required>
                        <option value="">-- Pilih Jenis Sasaran --</option>
                        <option value="CATIN">CATIN</option>
                        <option value="BUMIL">BUMIL</option>
                        <option value="BUFAS">BUFAS</option>
                        <option value="BADUTA">BADUTA</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Pilih Sasaran</label>
                    <select id="pend-sasaran" name="id_sasaran" class="form-control" required disabled>
                        <option value="">-- Pilih Jenis Dahulu --</option>
                    </select>
                </div>

                <div id="pend-info-sasaran" style="display: none; background: #e8f4fd; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #0d6efd;">
                </div>

                <div id="form-pendampingan-dinamis"></div>
                
                <div class="form-group"><label>Tanggal Kunjungan</label><input type="date" name="tgl_kunjungan" class="form-control" required></div>
                <div class="form-group"><label>Catatan Umum / Hasil</label><textarea name="catatan" class="form-control" rows="3" required></textarea></div>
                <button type="submit" class="btn-primary" style="margin-top: 15px; width: 100%;">💾 Simpan Pendampingan</button>
            </form>
        </div>
    </template>

    <template id="template-rekap">
        <div class="card animate-fade">
            <h3 style="margin-bottom: 20px; color: var(--primary); text-align: center;">📊 Rekapitulasi Bulanan</h3>
            
            <div style="background: #f8f9fa; border-radius: 8px; padding: 15px; margin-bottom: 20px; border: 1px solid #dee2e6;">
                <h4 style="color: #0d6efd; margin-bottom: 10px; font-size: 1rem;">👤 Rekap Kader (Anda)</h4>
                <table style="width: 100%; border-collapse: collapse; text-align: center; font-size: 0.9rem;">
                    <thead>
                        <tr style="background: #0d6efd; color: white;">
                            <th style="padding: 8px; border: 1px solid #c6c6c6; text-align: left;">Jenis Sasaran</th>
                            <th style="padding: 8px; border: 1px solid #c6c6c6;">Sasaran Aktif</th>
                            <th style="padding: 8px; border: 1px solid #c6c6c6;">Pendampingan</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-rekap-kader">
                        <tr><td colspan="3" style="padding: 10px;">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>

            <div style="background: #f8f9fa; border-radius: 8px; padding: 15px; border: 1px solid #dee2e6;">
                <h4 style="color: #198754; margin-bottom: 10px; font-size: 1rem;">👥 Rekap Tim</h4>
                <table style="width: 100%; border-collapse: collapse; text-align: center; font-size: 0.9rem;">
                    <thead>
                        <tr style="background: #198754; color: white;">
                            <th style="padding: 8px; border: 1px solid #c6c6c6; text-align: left;">Jenis Sasaran</th>
                            <th style="padding: 8px; border: 1px solid #c6c6c6;">Sasaran Aktif</th>
                            <th style="padding: 8px; border: 1px solid #c6c6c6;">Pendampingan</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-rekap-tim">
                        <tr><td colspan="3" style="padding: 10px;">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
            
        </div>
    </template>

    <template id="template-cetak-pdf">
        <div class="card animate-fade" style="text-align: center;">
            <h3 style="margin-bottom: 15px; color: var(--primary);">🖨️ Cetak PDF</h3>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">Fitur unduh laporan (Memerlukan koneksi internet).</p>
            <button class="btn-primary" style="background: #dc3545;" onclick="alert('Fitur cetak PDF akan aktif setelah tersambung ke Server Google.')">⬇️ Download PDF</button>
        </div>
    </template>
    
    <template id="template-ganti-pass">
        <div class="card animate-fade">
            <h3 style="margin-bottom: 15px; color: var(--primary);">🔑 Ganti Password</h3>
            <form id="form-ganti-pass" class="modern-form">
                <div class="form-group"><label>Password Baru</label><input type="password" id="pass-baru" class="form-control" required></div>
                <div class="form-group"><label>Konfirmasi Password</label><input type="password" id="pass-konfirm" class="form-control" required></div>
                <button type="submit" class="btn-primary" style="margin-top: 15px; width:100%;">🔄 Update Password</button>
            </form>
        </div>
    </template>

    <script src="assets/js/app.js" type="module"></script>
</body>
</html>
