<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPK Buleleng</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0084FF">
    <link rel="apple-touch-icon" href="TPK BLL26.png">
    
    <script src="data-wilayah.js"></script>
    <script src="data-kader.js"></script>
    <script src="data-pertanyaan.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #ffffff; color: #333333; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        :root { --primary-blue: #0084FF; --hover-blue: #006bce; --light-blue: #e6f3ff; --success: #28a745; --danger: #dc3545; --warning: #ffc107; }
        .hidden { display: none !important; }
        .container { padding: 20px; width: 100%; max-width: 480px; margin: 0 auto; padding-bottom: 50px; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s; }
        .splash-logo { width: 30vw; max-width: 150px; margin-bottom: 15px; animation: pulse 1.5s infinite; }
        .splash-text { font-size: 6vw; font-weight: bold; color: var(--primary-blue); text-align: center; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
        .login-logo { width: 80px; height: auto; display: block; margin: 0 auto 15px; }
        .header-title { text-align: center; margin-bottom: 20px; color: var(--primary-blue); font-size: 22px; margin-top: 10px;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; color: #444;}
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary-blue); outline: none; }
        .btn-primary { width: 100%; padding: 14px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;}
        .btn-secondary { width: 100%; padding: 12px; background-color: transparent; color: #666; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-edit { background-color: var(--warning); color: #333; border: none; padding: 6px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .dynamic-section { background-color: var(--light-blue); padding: 15px; border-radius: 8px; border: 1px dashed var(--primary-blue); margin-bottom: 15px; }
        .welcome-card { background-color: var(--light-blue); border-left: 5px solid var(--primary-blue); padding: 15px; border-radius: 8px; margin-bottom: 25px; margin-top: 20px; }
        .menu-grid { display: grid; gap: 15px; }
        .menu-btn { background-color: #fff; border: 2px solid var(--primary-blue); color: var(--primary-blue); padding: 15px; border-radius: 8px; font-size: 14px; font-weight: bold; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center;}
        .badge { background-color: var(--danger); color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-left: auto; margin-right: 10px;}
        .notif { padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .notif-success { background-color: var(--success); color: white; }
        .data-item { padding: 12px; background: white; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="TPK BLL26.png" class="splash-logo">
        <h1 class="splash-text">TPK KABUPATEN BULELENG</h1>
    </div>

    <div id="login-screen" class="container hidden">
        <div class="header-title" style="margin-top:50px;">
            <img src="TPK BLL26.png" class="login-logo">
            <h2>Login Kader</h2>
        </div>
        <form id="login-form">
            <div class="form-group"><label>ID Kader</label><input type="text" id="id-kader" placeholder="Gunakan ID di data-kader.js (Cth: KDR-01-GRK)" required></div>
            <div class="form-group"><label>Password (NIK)</label><input type="password" required pattern="[0-9]{16}" placeholder="16 Digit Angka"></div>
            <button type="submit" class="btn-primary">Masuk Aplikasi</button>
        </form>
    </div>

    <div id="main-menu" class="container hidden">
        <div id="notif-box" class="notif hidden"></div>
        <div class="welcome-card">
            <h3>Selamat Datang,</h3>
            <p id="kader-info-display" style="font-weight:bold;"></p>
            <button onclick="logoutKader()" style="margin-top:10px; padding:5px 10px; background:#dc3545; color:white; border:none; border-radius:5px;">Keluar / Logout</button>
        </div>
        <div class="menu-grid">
            <button class="menu-btn" onclick="openScreen('registrasi-screen')">1. REGISTRASI SASARAN <span>➕</span></button>
            <button class="menu-btn" onclick="bukaMenuLapor()">2. LAPOR PENDAMPINGAN <span>📝</span></button>
            <button class="menu-btn" onclick="bukaMenuData()">3 & 4. LIHAT/UPDATE DATA <span>📂</span></button>
            <button class="menu-btn" onclick="bukaMenuRekap()">5. REKAPITULASI DATA <span>📊</span></button>
            <button class="menu-btn" onclick="prosesSinkronisasi()" style="background:#e6f3ff;">
                <span id="sync-text">6. SINKRONISASI DATA</span>
                <span class="badge hidden" id="sync-badge">0</span>
                <div class="loader" id="sync-loader"></div>
            </button>
        </div>
    </div>

    <div id="registrasi-screen" class="container hidden">
        <h2 class="header-title" id="judul-form-sasaran">Registrasi Sasaran Baru</h2>
        <form id="form-registrasi">
            <div class="form-group"><label>Kecamatan *</label><select id="reg-kecamatan" required onchange="ubahKecamatan()"><option value="">-- Pilih --</option><option value="GRK">Gerokgak</option><option value="SRT">Seririt</option><option value="BLL">Buleleng</option></select></div>
            <div class="form-group"><label>Desa/Kelurahan *</label><select id="reg-desa" required onchange="ubahDesa()" disabled style="background:#f0f0f0;"><option value="">-- Pilih Kecamatan Dulu --</option></select></div>
            <div class="form-group"><label>Banjar Dinas / RW *</label><select id="reg-dusun" required disabled style="background:#f0f0f0;" onchange="handleJenisSasaran(false)"><option value="">-- Pilih Desa Dulu --</option></select></div>
            
            <div class="form-group"><label>Jenis Sasaran *</label><select id="reg-jenis" required onchange="handleJenisSasaran(false)"><option value="">-- Pilih --</option><option value="CATIN">CATIN</option><option value="BUMIL">BUMIL</option><option value="BUFAS">BUFAS</option><option value="BADUTA">BADUTA</option></select></div>
            <div class="form-group"><label>ID Sasaran</label><input type="text" id="reg-id" readonly placeholder="Otomatis"></div>
            <div class="form-group"><label>NIK Sasaran (16 Digit) *</label><input type="text" id="reg-nik" required pattern="[0-9]{16}"></div>
            <div class="form-group"><label>Nama Lengkap Sasaran *</label><input type="text" id="reg-nama" required></div>
            <div id="pertanyaan-khusus" class="dynamic-section hidden"><h4 id="judul-khusus">Pertanyaan Khusus</h4><div id="konten-khusus"></div></div>
            
            <button type="submit" class="btn-primary" id="btn-submit-sasaran">Simpan Sasaran</button>
            <button type="button" class="btn-secondary" onclick="batalFormSasaran()">Batal & Kembali</button>
        </form>
    </div>

    <div id="lapor-screen" class="container hidden">
        <h2 class="header-title" id="judul-form-laporan">Lapor Pendampingan</h2>
        <form id="form-laporan">
            <div class="form-group"><label>Pilih Sasaran *</label><select id="lapor-sasaran-id" required></select></div>
            <div class="form-group"><label>Tanggal *</label><input type="date" id="lapor-tanggal" required></div>
            <div class="form-group"><label>Bulan *</label><select id="lapor-bulan" required><option value="Januari">Januari</option><option value="Februari">Februari</option><option value="Maret">Maret</option></select></div>
            <div class="dynamic-section">
                <h4>Pemeriksaan</h4>
                <div class="form-group"><label>Status Risiko *</label><select id="lapor-status" required><option value="">-- Pilih --</option><option value="Normal">Normal</option><option value="Beresiko">Beresiko</option></select></div>
                <div class="form-group"><label>Edukasi *</label><select id="lapor-edukasi" required><option value="">-- Pilih --</option><option value="KIE">KIE</option><option value="Rujukan">Rujukan</option></select></div>
                <div class="form-group"><label>Catatan</label><textarea id="lapor-catatan"></textarea></div>
            </div>
            <button type="submit" class="btn-primary" id="btn-submit-laporan">Simpan Laporan</button>
            <button type="button" class="btn-secondary" onclick="batalFormLaporan()">Batal & Kembali</button>
        </form>
    </div>

    <div id="data-screen" class="container hidden"><h2 class="header-title">Data Tersimpan</h2><div class="dynamic-section"><h4>Sasaran</h4><div id="list-sasaran"></div></div><div class="dynamic-section"><h4>Laporan</h4><div id="list-laporan"></div></div><button class="btn-secondary" onclick="kembaliKeMenu()">Kembali</button></div>
    <div id="rekap-screen" class="container hidden"><h2 class="header-title">Rekapitulasi</h2><div class="welcome-card" id="rekap-content"></div><button class="btn-secondary" onclick="kembaliKeMenu()">Kembali</button></div>

    <script>
        let editModeSasaranId = null, editModeLaporanId = null, db;

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

        const request = indexedDB.open("TPK_Buleleng_DB", 2); 
        request.onupgradeneeded = e => {
            db = e.target.result;
            if (!db.objectStoreNames.contains('sasaran')) db.createObjectStore('sasaran', { keyPath: 'id_sasaran' });
            if (!db.objectStoreNames.contains('laporan')) db.createObjectStore('laporan', { keyPath: 'id_laporan' });
        };
        request.onsuccess = e => { db = e.target.result; updateBadgeSinkronisasi(); };

        window.addEventListener('load', () => { 
            setTimeout(() => { 
                document.getElementById('splash-screen').classList.add('hidden'); 
                const kader = localStorage.getItem('id_kader_aktif');
                if(kader) { document.getElementById('kader-info-display').innerText = `ID Anda: ${kader}`; openScreen('main-menu'); } 
                else { document.getElementById('login-screen').classList.remove('hidden'); }
            }, 2000); 
        });

        function openScreen(id) { document.querySelectorAll('.container').forEach(el => el.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); window.scrollTo(0,0); }
        function kembaliKeMenu() { openScreen('main-menu'); updateBadgeSinkronisasi(); }
        function logoutKader() { if(confirm("Yakin ingin keluar?")) { localStorage.removeItem('id_kader_aktif'); location.reload(); } }

        document.getElementById('login-form').addEventListener('submit', e => { 
            e.preventDefault(); 
            const inputId = document.getElementById('id-kader').value.toUpperCase(); 
            if (daftarKaderValid.includes(inputId)) {
                localStorage.setItem('id_kader_aktif', inputId); document.getElementById('kader-info-display').innerText = `ID Anda: ${inputId}`; openScreen('main-menu'); updateBadgeSinkronisasi(); 
            } else { alert("❌ ID Kader tidak terdaftar di data-kader.js!"); }
        });

        // WILAYAH CASCADE
        function ubahKecamatan() {
            const kec = document.getElementById('reg-kecamatan').value;
            const desa = document.getElementById('reg-desa');
            const dusun = document.getElementById('reg-dusun');
            desa.innerHTML = '<option value="">-- Pilih Desa --</option>'; dusun.innerHTML = '<option value="">-- Pilih Desa Dulu --</option>';
            desa.disabled = true; dusun.disabled = true; desa.style.background = '#f0f0f0'; dusun.style.background = '#f0f0f0';
            if (kec && dataWilayah[kec]) {
                desa.disabled = false; desa.style.background = '#fff';
                for (let d in dataWilayah[kec]) desa.innerHTML += `<option value="${d}">${d}</option>`;
            }
            handleJenisSasaran(false);
        }
        function ubahDesa() {
            const kec = document.getElementById('reg-kecamatan').value;
            const desa = document.getElementById('reg-desa').value;
            const dusun = document.getElementById('reg-dusun');
            dusun.innerHTML = '<option value="">-- Pilih Dusun --</option>'; dusun.disabled = true; dusun.style.background = '#f0f0f0';
            if (kec && desa && dataWilayah[kec][desa]) {
                dusun.disabled = false; dusun.style.background = '#fff';
                dataWilayah[kec][desa].forEach(d => dusun.innerHTML += `<option value="${d}">${d}</option>`);
            }
            handleJenisSasaran(false);
        }

        // PERTANYAAN DINAMIS
        function handleJenisSasaran(isEditMode = false) {
            const kec = document.getElementById('reg-kecamatan').value;
            const jenis = document.getElementById('reg-jenis').value;
            const idField = document.getElementById('reg-id');
            const cont = document.getElementById('pertanyaan-khusus');
            const konten = document.getElementById('konten-khusus');

            if (!isEditMode && !editModeSasaranId) idField.value = (kec && jenis) ? `${jenis}-${kec}-${Math.random().toString(36).substring(2, 6).toUpperCase()}` : "";
            
            let html = "";
            if (jenis && pertanyaanKhusus[jenis]) {
                pertanyaanKhusus[jenis].forEach(tanya => {
                    let req = tanya.required ? "required" : ""; let bintang = tanya.required ? " *" : "";
                    html += `<div class="form-group"><label>${tanya.label}${bintang}</label>`;
                    if (tanya.type === "select") {
                        html += `<select name="${tanya.id_input}" ${req}><option value="">-- Pilih --</option>`;
                        tanya.options.forEach(opt => html += `<option value="${opt}">${opt}</option>`); html += `</select></div>`;
                    } else {
                        html += `<input type="${tanya.type}" name="${tanya.id_input}" ${tanya.step ? `step="${tanya.step}"`:""} ${req}></div>`;
                    }
                });
            }
            if (html !== "") { konten.innerHTML = html; cont.classList.remove('hidden'); } else { cont.classList.add('hidden'); konten.innerHTML = ""; }
        }

        // SIMPAN SASARAN
        document.getElementById('form-registrasi').addEventListener('submit', e => {
            e.preventDefault(); 
            const data = { 
                id_kader: localStorage.getItem('id_kader_aktif'), id_sasaran: document.getElementById('reg-id').value, 
                kecamatan: document.getElementById('reg-kecamatan').value, desa: document.getElementById('reg-desa').value, dusun: document.getElementById('reg-dusun').value,
                jenis: document.getElementById('reg-jenis').value, nik: document.getElementById('reg-nik').value, nama: document.getElementById('reg-nama').value, 
                status_sinkron: 0, detail_khusus: {}
            };
            document.querySelectorAll('#konten-khusus input, #konten-khusus select').forEach(el => data.detail_khusus[el.name] = el.value);
            db.transaction(['sasaran'], 'readwrite').objectStore('sasaran')[editModeSasaranId ? 'put' : 'add'](data).onsuccess = () => { tampilkanNotif(editModeSasaranId ? "✅ Diupdate!" : "✅ Disimpan!", "notif-success"); batalFormSasaran(); };
        });

        function batalFormSasaran() { document.getElementById('form-registrasi').reset(); document.getElementById('pertanyaan-khusus').classList.add('hidden'); document.getElementById('btn-submit-sasaran').innerText = "Simpan"; document.getElementById('judul-form-sasaran').innerText = "Registrasi Baru"; editModeSasaranId = null; ubahKecamatan(); kembaliKeMenu(); }

        // EDIT SASARAN
        function editSasaran(id) {
            db.transaction(['sasaran'], 'readonly').objectStore('sasaran').get(id).onsuccess = e => {
                const data = e.target.result; editModeSasaranId = id;
                document.getElementById('judul-form-sasaran').innerText = "Update Sasaran"; document.getElementById('btn-submit-sasaran').innerText = "Update";
                document.getElementById('reg-id').value = data.id_sasaran; document.getElementById('reg-nik').value = data.nik; document.getElementById('reg-nama').value = data.nama;
                
                document.getElementById('reg-kecamatan').value = data.kecamatan; ubahKecamatan();
                document.getElementById('reg-desa').value = data.desa; ubahDesa();
                document.getElementById('reg-dusun').value = data.dusun;
                document.getElementById('reg-jenis').value = data.jenis; handleJenisSasaran(true);
                
                setTimeout(() => { for(let key in data.detail_khusus) { let el = document.querySelector(`[name="${key}"]`); if(el) el.value = data.detail_khusus[key]; } }, 100);
                openScreen('registrasi-screen');
            };
        }

        // SIMPAN & EDIT LAPORAN
        function bukaMenuLapor() {
            const sel = document.getElementById('lapor-sasaran-id');
            db.transaction(['sasaran'], 'readonly').objectStore('sasaran').getAll().onsuccess = e => {
                const list = e.target.result; if(list.length === 0) return alert("Belum ada sasaran.");
                sel.innerHTML = '<option value="">-- Pilih Sasaran --</option>'; list.forEach(s => sel.innerHTML += `<option value="${s.id_sasaran}">[${s.jenis}] ${s.nama}</option>`);
                openScreen('lapor-screen');
            };
        }
        document.getElementById('form-laporan').addEventListener('submit', e => {
            e.preventDefault();
            const data = { id_kader: localStorage.getItem('id_kader_aktif'), id_laporan: editModeLaporanId || "REP-" + Date.now(), id_sasaran: document.getElementById('lapor-sasaran-id').value, tanggal: document.getElementById('lapor-tanggal').value, bulan: document.getElementById('lapor-bulan').value, status: document.getElementById('lapor-status').value, edukasi: document.getElementById('lapor-edukasi').value, catatan: document.getElementById('lapor-catatan').value, status_sinkron: 0 };
            db.transaction(['laporan'], 'readwrite').objectStore('laporan')[editModeLaporanId ? 'put' : 'add'](data).onsuccess = () => { tampilkanNotif(editModeLaporanId ? "✅ Laporan Diupdate!" : "✅ Laporan Disimpan!", "notif-success"); batalFormLaporan(); };
        });
        function batalFormLaporan() { document.getElementById('form-laporan').reset(); document.getElementById('btn-submit-laporan').innerText = "Simpan"; editModeLaporanId = null; kembaliKeMenu(); }
        
        function editLaporan(id) {
            db.transaction(['sasaran'], 'readonly').objectStore('sasaran').getAll().onsuccess = e => {
                const sel = document.getElementById('lapor-sasaran-id'); sel.innerHTML = ''; e.target.result.forEach(s => sel.innerHTML += `<option value="${s.id_sasaran}">[${s.jenis}] ${s.nama}</option>`);
                db.transaction(['laporan'], 'readonly').objectStore('laporan').get(id).onsuccess = e2 => {
                    const data = e2.target.result; editModeLaporanId = id; document.getElementById('btn-submit-laporan').innerText = "Update";
                    ['sasaran-id', 'tanggal', 'bulan', 'status', 'edukasi', 'catatan'].forEach(k => document.getElementById('lapor-'+k).value = data[k] || "");
                    openScreen('lapor-screen');
                };
            };
        }

        // TAMPILKAN DATA & REKAP
        function bukaMenuData() {
            openScreen('data-screen');
            db.transaction(['sasaran'], 'readonly').objectStore('sasaran').getAll().onsuccess = e => {
                document.getElementById('list-sasaran').innerHTML = e.target.result.map(s => `<div class="data-item"><strong>${s.nama}</strong> (${s.jenis})<br>ID: ${s.id_sasaran}<br>${s.status_sinkron===0?'⏳ Belum Sync':'✅ Sync'}<br><button onclick="editSasaran('${s.id_sasaran}')" class="btn-edit">✏️ Edit</button></div>`).join('') || "Kosong";
            };
            db.transaction(['laporan'], 'readonly').objectStore('laporan').getAll().onsuccess = e => {
                document.getElementById('list-laporan').innerHTML = e.target.result.map(l => `<div class="data-item">Sasaran ID: <strong>${l.id_sasaran}</strong><br>Bulan: ${l.bulan}<br>${l.status_sinkron===0?'⏳ Belum Sync':'✅ Sync'}<br><button onclick="editLaporan('${l.id_laporan}')" class="btn-edit">✏️ Edit</button></div>`).join('') || "Kosong";
            };
        }
        function bukaMenuRekap() {
            openScreen('rekap-screen');
            db.transaction(['sasaran'], 'readonly').objectStore('sasaran').getAll().onsuccess = e => {
                const s = e.target.result; 
                db.transaction(['laporan'], 'readonly').objectStore('laporan').getAll().onsuccess = ev => {
                    document.getElementById('rekap-content').innerHTML = `<h3>Total Sasaran: ${s.length}</h3><p>BUMIL: ${s.filter(x=>x.jenis==='BUMIL').length} | CATIN: ${s.filter(x=>x.jenis==='CATIN').length}</p><hr><h3>Total Laporan: ${ev.target.result.length}</h3>`;
                };
            };
        }

        // SINKRONISASI
        function updateBadgeSinkronisasi() {
            let count = 0;
            db.transaction(['sasaran'], 'readonly').objectStore('sasaran').getAll().onsuccess = e => {
                count += e.target.result.filter(i => i.status_sinkron === 0).length;
                db.transaction(['laporan'], 'readonly').objectStore('laporan').getAll().onsuccess = ev => {
                    count += ev.target.result.filter(i => i.status_sinkron === 0).length;
                    const b = document.getElementById('sync-badge'); if(count>0){ b.innerText=count; b.classList.remove('hidden'); } else b.classList.add('hidden');
                };
            };
        }
        function prosesSinkronisasi() {
            if(!navigator.onLine) return tampilkanNotif("❌ Sedang Offline!", "notif-warning");
            document.getElementById('sync-text').innerText = "Menyinkronkan..."; document.getElementById('sync-loader').style.display = 'block';
            
            let payload = { sasaran: [], laporan: [] };
            db.transaction(['sasaran'], 'readonly').objectStore('sasaran').getAll().onsuccess = e => {
                payload.sasaran = e.target.result.filter(i => i.status_sinkron === 0);
                db.transaction(['laporan'], 'readonly').objectStore('laporan').getAll().onsuccess = ev => {
                    payload.laporan = ev.target.result.filter(i => i.status_sinkron === 0);
                    if(payload.sasaran.length===0 && payload.laporan.length===0) { document.getElementById('sync-text').innerText = "SINKRONISASI DATA"; document.getElementById('sync-loader').style.display = 'none'; return tampilkanNotif("Data sudah sinkron semua.", "notif-success"); }

                    setTimeout(() => { // Simulasi server
                        const trx = db.transaction(['sasaran', 'laporan'], 'readwrite');
                        payload.sasaran.forEach(s => { s.status_sinkron = 1; trx.objectStore('sasaran').put(s); });
                        payload.laporan.forEach(l => { l.status_sinkron = 1; trx.objectStore('laporan').put(l); });
                        trx.oncomplete = () => { tampilkanNotif("✅ Berhasil Sinkron!", "notif-success"); document.getElementById('sync-text').innerText = "SINKRONISASI DATA"; document.getElementById('sync-loader').style.display = 'none'; updateBadgeSinkronisasi(); if(!document.getElementById('data-screen').classList.contains('hidden')) bukaMenuData(); };
                    }, 2000);
                };
            };
        }
        function tampilkanNotif(msg, cls) { const n = document.getElementById('notif-box'); n.innerText = msg; n.className = `notif ${cls}`; n.classList.remove('hidden'); setTimeout(() => n.classList.add('hidden'), 3000); }
    </script>
</body>
</html>
