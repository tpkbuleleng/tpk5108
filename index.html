<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPK Buleleng</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0084FF">
    <link rel="apple-touch-icon" href="TPK BLL26.png">
    
    <style>
        /* --- PENGATURAN DASAR --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #ffffff; color: #333333; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        :root { --primary-blue: #0084FF; --hover-blue: #006bce; --light-blue: #e6f3ff; --gray: #f0f0f0; --success: #28a745; --danger: #dc3545; }
        .hidden { display: none !important; }
        .container { padding: 20px; width: 100%; max-width: 480px; margin: 0 auto; padding-bottom: 50px; }

        /* --- SPLASH & LOGO --- */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease-out; }
        .splash-logo { width: 30vw; max-width: 150px; margin-bottom: 15px; animation: pulse-logo 1.5s infinite; }
        .splash-text { font-size: 6vw; font-weight: bold; color: var(--primary-blue); text-align: center; animation: pulse 1.5s infinite; padding: 0 20px 20px 20px; }
        @media (min-width: 600px) { .splash-text { font-size: 36px; } }
        @keyframes pulse-logo { 0% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.03); opacity: 1; } 100% { transform: scale(1); opacity: 0.9; } }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
        .login-logo { width: 80px; height: auto; display: block; margin: 0 auto 15px; }

        /* --- FORM STYLES --- */
        .header-title { text-align: center; margin-bottom: 20px; color: var(--primary-blue); font-size: 22px; margin-top: 10px;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; color: #444;}
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; transition: border-color 0.3s; background-color: #fff;}
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary-blue); outline: none; }
        .form-group input[readonly] { background-color: var(--gray); color: #666; font-weight: bold;}
        
        .btn-primary { width: 100%; padding: 14px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .btn-primary:hover { background-color: var(--hover-blue); }
        .btn-secondary { width: 100%; padding: 12px; background-color: transparent; color: #666; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-secondary:hover { background-color: #f9f9f9; }

        .dynamic-section { background-color: var(--light-blue); padding: 15px; border-radius: 8px; border: 1px dashed var(--primary-blue); margin-bottom: 15px; }
        .dynamic-section h4 { margin-bottom: 10px; color: var(--primary-blue); }

        /* --- MENU UTAMA KADER --- */
        .welcome-card { background-color: var(--light-blue); border-left: 5px solid var(--primary-blue); padding: 15px; border-radius: 8px; margin-bottom: 25px; margin-top: 20px; }
        .welcome-card h3 { color: var(--primary-blue); margin-bottom: 5px; font-size: 18px;}
        .welcome-card p { font-size: 14px; color: #444; font-weight: 500;}
        .menu-grid { display: grid; gap: 15px; }
        .menu-btn { background-color: #ffffff; border: 2px solid var(--primary-blue); color: var(--primary-blue); padding: 15px; border-radius: 8px; font-size: 14px; font-weight: bold; text-align: left; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: space-between; }
        .menu-btn:hover, .menu-btn:active { background-color: var(--primary-blue); color: #ffffff; }
        
        .badge { background-color: var(--danger); color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-left: auto; margin-right: 10px;}
        .btn-sync { background-color: #e6f3ff; border: 2px dashed var(--primary-blue); }

        .notif { padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .notif-success { background-color: var(--success); color: white; }
        .notif-warning { background-color: #ffc107; color: #333; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="TPK BLL26.png" alt="Logo TPK Buleleng" class="splash-logo">
        <h1 class="splash-text">TPK KABUPATEN BULELENG</h1>
    </div>

    <div id="login-screen" class="container hidden">
        <div class="login-header" style="text-align: center; margin-bottom: 30px; margin-top: 50px;">
            <img src="TPK BLL26.png" alt="Logo TPK Buleleng" class="login-logo">
            <h2 style="color: #0084FF;">Login Kader</h2>
            <p style="color: #666;">Silakan masukkan ID Anda untuk melanjutkan</p>
        </div>
        <form id="login-form">
            <div class="form-group"><label>ID Kader</label><input type="text" id="id-kader" placeholder="Contoh: KDR-01-GEROKGAK" required></div>
            <div class="form-group"><label>Password (NIK)</label><input type="password" id="password" placeholder="Masukkan 16 digit NIK" required pattern="[0-9]{16}"></div>
            <button type="submit" class="btn-primary">Masuk Aplikasi</button>
        </form>
    </div>

    <div id="main-menu" class="container hidden">
        <div id="notif-box" class="notif hidden">Pesan Notifikasi</div>
        
        <div class="welcome-card">
            <h3>Selamat Datang,</h3>
            <p id="kader-info-display">Nama Kader | Tim 1 | Desa Celukan Bawang | Kec. Gerokgak</p>
        </div>
        <h4 style="margin-bottom: 15px; color: #333;">Pilih Menu:</h4>
        <div class="menu-grid">
            <button class="menu-btn" onclick="openScreen('registrasi-screen')">1. REGISTRASI SASARAN <span class="icon">➕</span></button>
            <button class="menu-btn" onclick="bukaMenuLapor()">2. LAPOR PENDAMPINGAN <span class="icon">📝</span></button>
            <button class="menu-btn" onclick="lihatDataTersimpan()">3. LIHAT DATA TERSIMPAN <span class="icon">👥</span></button>
            <button class="menu-btn" onclick="alert('Tahap selanjutnya')">4. LIHAT/UPDATE LAPORAN <span class="icon">📋</span></button>
            <button class="menu-btn" onclick="alert('Tahap selanjutnya')">5. LIHAT REKAP BULANAN <span class="icon">📊</span></button>
            
            <button class="menu-btn btn-sync" onclick="prosesSinkronisasi()" id="btn-sync-ui">
                <span id="sync-text">6. SINKRONISASI DATA</span>
                <span class="badge hidden" id="sync-badge">0</span> 
                <div class="loader" id="sync-loader"></div>
                <span class="icon" id="sync-icon">🔄</span>
            </button>
        </div>
    </div>

    <div id="registrasi-screen" class="container hidden">
        <h2 class="header-title">Registrasi Sasaran Baru</h2>
        <form id="form-registrasi">
            <div class="form-group"><label>Kecamatan Domisili *</label><select id="reg-kecamatan" required onchange="handleJenisSasaran()"><option value="">-- Pilih Kecamatan --</option><option value="GRK">Gerokgak</option><option value="SRT">Seririt</option></select></div>
            <div class="form-group"><label>Jenis Sasaran *</label><select id="reg-jenis" required onchange="handleJenisSasaran()"><option value="">-- Pilih Jenis Sasaran --</option><option value="CATIN">CATIN</option><option value="BUMIL">BUMIL</option><option value="BUFAS">BUFAS</option><option value="BADUTA">BADUTA</option></select></div>
            <div class="form-group"><label>ID Sasaran</label><input type="text" id="reg-id" readonly placeholder="Otomatis"></div>
            <div class="form-group"><label>NIK Sasaran (16 Digit) *</label><input type="text" id="reg-nik" required pattern="[0-9]{16}"></div>
            <div class="form-group"><label>Nama Lengkap Sasaran *</label><input type="text" id="reg-nama" required></div>
            <div id="pertanyaan-khusus" class="dynamic-section hidden"><h4 id="judul-khusus">Pertanyaan Khusus</h4><div id="konten-khusus"></div></div>
            <button type="submit" class="btn-primary">Simpan Sasaran</button>
            <button type="button" class="btn-secondary" onclick="kembaliKeMenu()">Batal & Kembali</button>
        </form>
    </div>

    <div id="lapor-screen" class="container hidden">
        <h2 class="header-title">Lapor Pendampingan</h2>
        <form id="form-laporan">
            <div class="form-group"><label>Pilih Sasaran *</label><select id="lapor-sasaran-id" required></select></div>
            <div class="form-group"><label>Tanggal Pendampingan *</label><input type="date" id="lapor-tanggal" required></div>
            <div class="form-group"><label>Bulan Pelaporan *</label><select id="lapor-bulan" required><option value="Januari">Januari</option><option value="Februari">Februari</option></select></div>
            <div class="dynamic-section">
                <h4>Hasil Pemeriksaan/Pantauan</h4>
                <div class="form-group"><label>Status Kesehatan/Risiko *</label><select id="lapor-status" required><option value="Normal">Sehat / Normal</option><option value="Beresiko">Beresiko Stunting / Sakit</option></select></div>
                <div class="form-group"><label>Bantuan/Edukasi yang Diberikan *</label><select id="lapor-edukasi" required><option value="KIE">Penyuluhan / KIE</option></select></div>
                <div class="form-group"><label>Catatan Tambahan Kader</label><textarea id="lapor-catatan" rows="3"></textarea></div>
            </div>
            <button type="submit" class="btn-primary">Simpan Laporan</button>
            <button type="button" class="btn-secondary" onclick="kembaliKeMenu()">Batal & Kembali</button>
        </form>
    </div>

    <script>
        // --- REGISTRASI SERVICE WORKER UNTUK PWA (BARU) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('ServiceWorker PWA berhasil didaftarkan!', registration.scope);
                })
                .catch(err => {
                    console.log('ServiceWorker PWA gagal didaftarkan: ', err);
                });
            });
        }

        // --- INISIALISASI DATABASE OFFLINE ---
        let db;
        const request = indexedDB.open("TPK_Buleleng_DB", 2); 
        request.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains('sasaran')) db.createObjectStore('sasaran', { keyPath: 'id_sasaran' });
            if (!db.objectStoreNames.contains('laporan')) db.createObjectStore('laporan', { keyPath: 'id_laporan' });
        };
        request.onsuccess = function(e) { 
            db = e.target.result; 
            updateBadgeSinkronisasi();
        };

        // --- LOGIKA UI DASAR ---
        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('splash-screen').classList.add('hidden'); document.getElementById('login-screen').classList.remove('hidden'); }, 2000); 
        });

        function openScreen(screenId) {
            document.querySelectorAll('.container').forEach(el => el.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function kembaliKeMenu() { openScreen('main-menu'); updateBadgeSinkronisasi(); }

        document.getElementById('login-form').addEventListener('submit', function(e) { 
            e.preventDefault(); openScreen('main-menu'); updateBadgeSinkronisasi();
        });

        // --- LOGIKA FORM ---
        function handleJenisSasaran() {
            const kec = document.getElementById('reg-kecamatan').value;
            const jenis = document.getElementById('reg-jenis').value;
            const idField = document.getElementById('reg-id');
            const cont = document.getElementById('pertanyaan-khusus');
            const konten = document.getElementById('konten-khusus');

            if (kec && jenis) idField.value = `${jenis}-${kec}-${Math.random().toString(36).substring(2, 6).toUpperCase()}`;
            else idField.value = "";
            
            let html = "";
            if (jenis === "CATIN") html = `<div class="form-group"><label>LiLA (cm)</label><input type="number" step="0.1" name="lila" required></div>`;
            else if (jenis === "BUMIL") html = `<div class="form-group"><label>Gravida</label><input type="number" name="gravida" required></div>`;
            if (html !== "") { konten.innerHTML = html; cont.classList.remove('hidden'); } else { cont.classList.add('hidden'); konten.innerHTML = ""; }
        }

        document.getElementById('form-registrasi').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const data = { id_sasaran: document.getElementById('reg-id').value, jenis: document.getElementById('reg-jenis').value, nama: document.getElementById('reg-nama').value, status_sinkron: 0 };
            db.transaction(['sasaran'], 'readwrite').objectStore('sasaran').add(data).onsuccess = () => {
                tampilkanNotif("✅ Sasaran disimpan offline!", "notif-success"); document.getElementById('form-registrasi').reset(); kembaliKeMenu();
            };
        });

        function bukaMenuLapor() {
            const sel = document.getElementById('lapor-sasaran-id');
            db.transaction(['sasaran'], 'readonly').objectStore('sasaran').getAll().onsuccess = (e) => {
                const list = e.target.result;
                if(list.length === 0) return alert("Belum ada sasaran teregistrasi.");
                sel.innerHTML = '<option value="">-- Pilih Sasaran --</option>';
                list.forEach(s => sel.innerHTML += `<option value="${s.id_sasaran}">[${s.jenis}] ${s.nama}</option>`);
                openScreen('lapor-screen');
            };
        }

        document.getElementById('form-laporan').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = { id_laporan: "REP-" + Date.now(), id_sasaran: document.getElementById('lapor-sasaran-id').value, status_sinkron: 0 };
            db.transaction(['laporan'], 'readwrite').objectStore('laporan').add(data).onsuccess = () => {
                tampilkanNotif("✅ Laporan disimpan offline!", "notif-success"); document.getElementById('form-laporan').reset(); kembaliKeMenu();
            };
        });

        // --- LOGIKA SINKRONISASI ---
        function updateBadgeSinkronisasi() {
            let belumSinkron = 0;
            db.transaction(['sasaran'], 'readonly').objectStore('sasaran').getAll().onsuccess = (e) => {
                belumSinkron += e.target.result.filter(item => item.status_sinkron === 0).length;
                db.transaction(['laporan'], 'readonly').objectStore('laporan').getAll().onsuccess = (ev) => {
                    belumSinkron += ev.target.result.filter(item => item.status_sinkron === 0).length;
                    const badge = document.getElementById('sync-badge');
                    if (belumSinkron > 0) { badge.innerText = belumSinkron; badge.classList.remove('hidden'); } 
                    else { badge.classList.add('hidden'); }
                };
            };
        }

        function prosesSinkronisasi() {
            if(!navigator.onLine) return tampilkanNotif("❌ Anda sedang Offline. Cari sinyal internet dulu!", "notif-warning");

            document.getElementById('sync-text').innerText = "Menyinkronkan...";
            document.getElementById('sync-icon').classList.add('hidden');
            document.getElementById('sync-loader').style.display = 'block';
            document.getElementById('btn-sync-ui').disabled = true;

            let dataPayload = { sasaran: [], laporan: [] };
            db.transaction(['sasaran'], 'readonly').objectStore('sasaran').getAll().onsuccess = (e) => {
                dataPayload.sasaran = e.target.result.filter(item => item.status_sinkron === 0);
                db.transaction(['laporan'], 'readonly').objectStore('laporan').getAll().onsuccess = (ev) => {
                    dataPayload.laporan = ev.target.result.filter(item => item.status_sinkron === 0);

                    if(dataPayload.sasaran.length === 0 && dataPayload.laporan.length === 0) {
                        resetTombolSync(); return tampilkanNotif("Data sudah sinkron semua.", "notif-success");
                    }

                    setTimeout(() => {
                        const trxUpdate = db.transaction(['sasaran', 'laporan'], 'readwrite');
                        dataPayload.sasaran.forEach(s => { s.status_sinkron = 1; trxUpdate.objectStore('sasaran').put(s); });
                        dataPayload.laporan.forEach(l => { l.status_sinkron = 1; trxUpdate.objectStore('laporan').put(l); });

                        trxUpdate.oncomplete = () => {
                            tampilkanNotif(`✅ Berhasil menyinkronkan ${dataPayload.sasaran.length} Sasaran & ${dataPayload.laporan.length} Laporan!`, "notif-success");
                            resetTombolSync(); updateBadgeSinkronisasi();
                        };
                    }, 2500); 
                };
            };
        }

        function resetTombolSync() {
            document.getElementById('sync-text').innerText = "6. SINKRONISASI DATA";
            document.getElementById('sync-icon').classList.remove('hidden');
            document.getElementById('sync-loader').style.display = 'none';
            document.getElementById('btn-sync-ui').disabled = false;
        }

        function tampilkanNotif(pesan, tipeClass) {
            const notif = document.getElementById('notif-box');
            notif.innerText = pesan; notif.className = `notif ${tipeClass}`;
            notif.classList.remove('hidden'); setTimeout(() => notif.classList.add('hidden'), 4000);
        }
        
        function lihatDataTersimpan() { alert("Silakan buka Console Browser (F12) untuk melihat data."); }
    </script>
</body>
</html>
