<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPK Buleleng</title>
    
    <meta name="description" content="Aplikasi Laporan Tim Pendamping Keluarga (TPK) Kabupaten Buleleng.">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0084FF">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo-tpk26.png">
    
    <script src="data-wilayah.js"></script>
    <script src="data-kader.js"></script>
    <script src="data-pertanyaan.js"></script>

    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

    <div id="splash-screen">
        <img src="logo-tpk26.png" class="splash-logo" alt="Logo TPK Buleleng">
        <h1 class="splash-text">TPK KABUPATEN BULELENG</h1>
        <p class="version-text">Versi 1.0.5</p>
    </div>

    <div id="login-screen" class="container hidden">
        <div class="header-title" style="margin-top:20px;">
            <img src="logo-tpk26.png" class="login-logo" alt="Logo TPK">
            Laporan TPK<br><span style="font-size: 18px; color: #666;">Kabupaten Buleleng</span>
        </div>
        <form id="login-form">
            <div class="form-group">
                <label for="id-kader">ID Pengguna</label>
                <input type="text" id="id-kader" placeholder="Masukkan ID sesuai master Google Sheet" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" required maxlength="64" minlength="4" placeholder="Masukkan Password" autocomplete="current-password" style="padding-right: 90px;">
                <span class="toggle-pwd" id="toggle-pwd-icon" onclick="togglePassword()">Lihat</span>
            </div>
            <button type="submit" class="btn-primary">Masuk Aplikasi</button>
        </form>
    </div>

    <div id="registrasi-screen" class="container hidden">
        <h2 class="header-title" id="judul-form-sasaran">Registrasi Sasaran Baru</h2>
        <form id="form-registrasi">
            <div class="form-group hidden" id="reg-kecamatan-group">
                <label for="reg-kecamatan">Kecamatan *</label>
                <select id="reg-kecamatan" required onchange="ubahKecamatan()">
                    <option value="">-- Pilih --</option>
                    <option value="GRK">Gerokgak</option>
                    <option value="SRT">Seririt</option>
                    </select>
            </div>
            <div class="form-group">
                <label for="reg-desa">Desa/Kelurahan *</label>
                <select id="reg-desa" required onchange="ubahDesa()"><option value="">-- Pilih Kecamatan Dulu --</option></select>
            </div>
            <div class="form-group">
                <label for="reg-dusun">Banjar Dinas / RW *</label>
                <select id="reg-dusun" required onchange="handleJenisSasaran(false)"><option value="">-- Pilih Desa Dulu --</option></select>
            </div>
            <div class="form-group">
                <label for="reg-jenis">Jenis Sasaran *</label>
                <select id="reg-jenis" required onchange="handleJenisSasaran(false)">
                    <option value="">-- Pilih --</option>
                    <option value="CATIN">CATIN</option>
                    </select>
            </div>
            <div class="form-group">
                <label for="reg-id">ID Sasaran</label>
                <input type="text" id="reg-id" readonly placeholder="Terisi Otomatis">
            </div>
            <div class="form-group">
                <label for="reg-nik">NIK Sasaran (16 Digit) *</label>
                <input type="text" id="reg-nik" required pattern="[0-9]{16}" maxlength="16" minlength="16" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
            </div>
            <div class="form-group">
                <label for="reg-nama">Nama Lengkap Sasaran *</label>
                <input type="text" id="reg-nama" required>
            </div>
            
            <div id="pertanyaan-khusus" class="dynamic-section hidden"><h4 id="judul-khusus">Pertanyaan Khusus</h4><div id="konten-khusus"></div></div>
            <button type="submit" class="btn-primary" id="btn-submit-sasaran">Simpan Sasaran</button>
            <button type="button" class="btn-secondary" onclick="batalFormSasaran()">Batal & Kembali</button>
        </form>
    </div>

    <script src="assets/js/core/00-init-state-db.js" defer></script>
    <script src="assets/js/core/10-wilayah-scope.js" defer></script>
    <script src="assets/js/kader/20-data-rekap-sync.js" defer></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => console.log('ServiceWorker sukses didaftarkan dengan scope: ', registration.scope))
                    .catch(err => console.log('ServiceWorker gagal didaftarkan: ', err));
            });
        }
    </script>
</body>
</html>
